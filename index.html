<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Link Forwarder - Please Wait</title>

    <!-- 🔴 ১. Monetag Verification Code 🔴 -->
    <meta name="monetag" content="আপনার_মোনেটাগ_ভেরিফিকেশন_কোড_এখানে">

    <!-- 🔴 ২. Monetag Scripts (Vignette, In-Page Push, Popunder) এই হেডারের ভেতর বসাবেন 🔴 -->
    <!-- উদাহরণ: <script src="monetag-popunder.js"></script> -->

    <!-- Google Fonts for Premium Look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .main-card {
            background: #ffffff;
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid #eef2f5;
        }
        .header-icon {
            width: 60px;
            height: 60px;
            background: #e0f7fa;
            color: #00acc1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            margin: 0 auto 20px auto;
        }
        h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1e272e;
            margin-bottom: 10px;
        }
        p.subtitle {
            font-size: 15px;
            color: #808e9b;
            margin-bottom: 25px;
        }
        
        /* Premium Ad Space */
        .ad-container {
            background: #fafbfc;
            border: 2px dashed #d2dae2;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            min-height: 250px; /* Perfect for Banner/Native Ads */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b2bec3;
            font-weight: 500;
            font-size: 14px;
        }

        /* Progress Bar Timer */
        .progress-wrapper {
            background: #ecf0f1;
            border-radius: 20px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
        }
        .progress-bar {
            background: linear-gradient(90deg, #0984e3, #00cec9);
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 1s linear;
        }
        .timer-text {
            font-size: 18px;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 20px;
        }
        .timer-text span {
            color: #d63031;
            font-size: 22px;
        }

        /* Action Button */
        .action-btn {
            display: none; /* Initially hidden */
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            border: none;
            padding: 16px 35px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 206, 201, 0.3);
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 206, 201, 0.4);
        }

        .footer-secure {
            margin-top: 25px;
            font-size: 12px;
            color: #a4b0be;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- Logo / Icon -->
        <div class="header-icon">
            🔒
        </div>
        
        <h2>Securing Your Link...</h2>
        <p class="subtitle">Please wait while we verify and redirect you to your destination.</p>

        <!-- 🔴 ৩. Monetag Banner Ad Placeholder (Top) 🔴 -->
        <div class="ad-container">
            [ Premium Ad Space 1 ]
            <!-- Paste Monetag Banner Script Here -->
        </div>

        <!-- Timer & Progress Bar -->
        <div id="timer-section">
            <div class="timer-text">Please wait <span id="time-left">15</span> seconds</div>
            <div class="progress-wrapper">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <!-- 🔴 Click to Trigger Popunder & Redirect 🔴 -->
        <button id="go-button" class="action-btn" onclick="goToDestination()">
            🚀 Go To Destination
        </button>

        <!-- 🔴 ৪. Monetag Banner Ad Placeholder (Bottom) 🔴 -->
        <div class="ad-container" style="min-height: 100px;">
            [ Premium Ad Space 2 ]
            <!-- Paste Monetag Banner Script Here -->
        </div>

        <div class="footer-secure">
            🛡️ 100% Safe & Secure Connection
        </div>
    </div>

    <script>
        // 🔴 আপনার মেইন ওয়েবসাইটের লিংক (কোথায় যাবে) 🔴
        const targetURL = "https://bdhot.vercel.app/";
        
        let totalSeconds = 15;
        let currentSecond = 0;
        
        const timeDisplay = document.getElementById('time-left');
        const progressBar = document.getElementById('progress-bar');
        const timerSection = document.getElementById('timer-section');
        const goButton = document.getElementById('go-button');

        // Timer Logic
        const interval = setInterval(() => {
            currentSecond++;
            let remaining = totalSeconds - currentSecond;
            
            // Update Text
            timeDisplay.innerText = remaining;
            
            // Update Progress Bar Width
            let progressPercentage = (currentSecond / totalSeconds) * 100;
            progressBar.style.width = progressPercentage + "%";

            // When Timer Reaches 0
            if (currentSecond >= totalSeconds) {
                clearInterval(interval);
                
                // Hide timer and show the Action Button
                timerSection.style.display = "none";
                goButton.style.display = "block";
                
                // Optional: Change title to grab attention
                document.querySelector('h2').innerText = "Your Link is Ready!";
                document.querySelector('.subtitle').innerText = "Click the button below to proceed safely.";
            }
        }, 1000); // 1 second interval

        // Redirect Function
        function goToDestination() {
            // Because the user CLICKS this button, Monetag's Popunder & Vignette will trigger easily!
            window.location.href = targetURL;
        }
    </script>

</body>
</html>
