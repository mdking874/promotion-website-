<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 🔴 ১. Monetag ভেরিফিকেশন কোড এখানে বসান (যাতে সাইট অ্যাপ্রুভ হয়) 🔴 -->
    <meta name="monetag" content="আপনার_মোনেটাগ_ভেরিফিকেশন_কোড_এখানে">
    
    <!-- 🔴 ২. Monetag-এর Popunder বা Vignette অ্যাড স্ক্রিপ্ট (Script) এখানে বসাবেন 🔴 -->
    <!-- <script src="monetag-script-link.js"></script> -->

    <title>Please Wait... Loading Your Link</title>
    
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            width: 90%;
            max-width: 600px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-top: 5px solid #2e86de;
        }
        h2 {
            color: #222f3e;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p.desc {
            color: #576574;
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .ad-space {
            background: #f8f9fa;
            border: 2px dashed #c8d6e5;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            min-height: 250px; /* Monetag Banner বা In-Page Push এর জন্য */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8395a7;
            font-weight: bold;
        }
        .timer-box {
            background: #ff9f43;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.4);
        }
        .timer-box span {
            font-size: 26px;
        }
        .footer-note {
            margin-top: 30px;
            font-size: 14px;
            color: #a4b0be;
        }
        .footer-note a {
            color: #2e86de;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Your Link is Almost Ready!</h2>
        <p class="desc">আপনার কাঙ্ক্ষিত ওয়েবসাইটে যাওয়ার জন্য লিংকটি প্রস্তুত করা হচ্ছে। অনুগ্রহ করে নিচে দেওয়া সময় পর্যন্ত অপেক্ষা করুন।</p>
        
        <!-- 🔴 ৩. Monetag Banner বা Direct Link অ্যাড এখানে বসান 🔴 -->
        <div class="ad-space">
            [ Monetag Advertisement Zone ]
        </div>

        <!-- টাইমার সেকশন -->
        <div class="timer-box" id="timer-container">
            অপেক্ষা করুন: <span id="countdown">15</span> সেকেন্ড
        </div>
        
        <p class="footer-note" id="manual-redirect-text" style="display: none;">
            রিডাইরেক্ট না হলে <a href="https://bdhot.vercel.app/" id="manual-link">এখানে ক্লিক করুন</a>
        </p>
    </div>

    <script>
        // 🔴 আপনার মেইন ওয়েবসাইটের লিংক এখানে সেট করা আছে 🔴
        var targetWebsite = "https://bdhot.vercel.app/"; 
        
        var timeLeft = 15; // ১৫ সেকেন্ড টাইমার
        var countdownElement = document.getElementById("countdown");
        var timerContainer = document.getElementById("timer-container");
        var manualRedirectText = document.getElementById("manual-redirect-text");

        var timer = setInterval(function() {
            timeLeft--;
            countdownElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                
                // টাইমার শেষ হলে টেক্সট পরিবর্তন হবে
                timerContainer.style.background = "#1dd1a1"; // কালার সবুজ হবে
                timerContainer.style.boxShadow = "0 4px 15px rgba(29, 209, 161, 0.4)";
                timerContainer.innerHTML = "লিংক প্রস্তুত হয়েছে! রিডাইরেক্ট করা হচ্ছে...";
                
                manualRedirectText.style.display = "block"; // ম্যানুয়াল লিংক শো করবে
                
                // 🔴 ১৫ সেকেন্ড পর অটোমেটিক আপনার Vercel সাইটে নিয়ে যাবে 🔴
                window.location.href = targetWebsite; 
            }
        }, 1000);
    </script>

</body>
</html>
